# laction.ini — local container run profiles
# Usage: laction [project-path] [profile]
#        laction .            → runs [default]
#        laction . test       → runs [test]

[default]
image = ubuntu:latest
run = ./scripts/build.sh

[test]
image = ubuntu:latest
run = ./scripts/test.sh

[lint]
image = node:20
run = npm run lint

[build]
image = node:20
run = npm run build
